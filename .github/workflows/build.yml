name: build

on:
  push:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest
      - run: python -m pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h /

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip wget curl build-essential pkg-config \
            autoconf automake libtool libffi-dev libssl-dev \
            python3-dev zlib1g-dev lld

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3.0" buildozer

      - name: Setup project
        run: bash setup.sh

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee /tmp/build.log
        timeout-minutes: 45

      - name: Build log diagnostics (on failure)
        if: failure()
        run: |
          echo "========================= ERROR LINES ========================="
          grep -n -i -E \
            "error|fail|exception|traceback|could not|not found|cannot|fatal|build failed|aborted|unresolved|duplicate class|manifest merger|minsdk|compilesdk" \
            /tmp/build.log | tail -n 120 || echo "(no error-pattern lines matched)"
          echo ""
          echo "========================= LAST 80 LINES ======================="
          tail -n 80 /tmp/build.log || true

      - uses: actions/upload-artifact@v4
        with:
          name: sentinelx-apk-${{ github.sha }}
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
