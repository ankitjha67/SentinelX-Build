name: build

on:
  push:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest
      - run: python -m pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write   # publish OTA releases
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h /

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip wget curl build-essential pkg-config \
            autoconf automake libtool libffi-dev libssl-dev \
            python3-dev zlib1g-dev lld

      - name: Install Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3.0" buildozer
          # NOTE: the p4a version is pinned in buildozer.spec (p4a.branch = v2024.01.21);
          # buildozer clones its own p4a, so a pip pin here would have no effect.

      - name: Setup project
        run: bash setup.sh

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          # p4a branch is part of the key so switching p4a forces a fresh clone
          # (buildozer reuses an existing .buildozer p4a checkout otherwise).
          key: buildozer-p4a-v2024.01.21-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-p4a-v2024.01.21-${{ runner.os }}-

      # Inject a monotonic versionCode AFTER cache restore so the cache key
      # (hash of the committed buildozer.spec) stays stable across runs. This
      # versionCode is what each device compares against the published manifest.
      - name: Set build version code
        run: |
          if grep -q '^android.numeric_version' buildozer.spec; then
            sed -i "s/^android.numeric_version.*/android.numeric_version = ${{ github.run_number }}/" buildozer.spec
          else
            printf '\nandroid.numeric_version = %s\n' "${{ github.run_number }}" >> buildozer.spec
          fi
          grep -E '^version|^android.numeric_version' buildozer.spec

      - name: Build debug APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee /tmp/build.log
        timeout-minutes: 45

      - name: Build log diagnostics (on failure)
        if: failure()
        run: |
          PAT="error|fail|exception|traceback|could not|not found|cannot|fatal|build failed|aborted|unresolved|duplicate class|manifest merger|minsdk|compilesdk|what went wrong"
          # Console (full)
          echo "========================= ERROR LINES ========================="
          grep -n -i -E "$PAT" /tmp/build.log | tail -n 120 || echo "(no error-pattern lines matched)"
          echo ""
          echo "========================= LAST 80 LINES ======================="
          tail -n 80 /tmp/build.log || true

          # Step summary (rendered on the run page)
          {
            echo "## Build failure diagnostics"
            echo '### Matched error lines (last 40)'
            echo '```'
            grep -i -E "$PAT" /tmp/build.log | tail -n 40 || echo "(none matched)"
            echo '```'
            echo '### Last 60 lines'
            echo '```'
            tail -n 60 /tmp/build.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Identify the failing package: context just before the build failure
          FAILLINE=$(grep -n -E "ninja: build stopped|Backend subprocess exited|Command failed" /tmp/build.log | head -n 1 | cut -d: -f1)
          if [ -n "$FAILLINE" ]; then
            START=$(( FAILLINE > 60 ? FAILLINE - 60 : 1 ))
            echo "===================== CONTEXT BEFORE FAILURE ====================="
            sed -n "${START},${FAILLINE}p" /tmp/build.log
            {
              echo "### Context before failure (60 lines)"
              echo '```'
              sed -n "${START},${FAILLINE}p" /tmp/build.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          # Annotations: package-identifying lines + error lines (readable without log access)
          grep -E "Building wheel|Preparing metadata|other_builds/|python-installs|Building recipe|Cythonizing|Downloading .*\.(tar|whl|zip)|Getting build dependencies|^Processing |Building compiled components|recipe .* for" /tmp/build.log \
            | tail -n 6 | while IFS= read -r line; do echo "::error::PKG: ${line}"; done || true
          grep -i -E "$PAT" /tmp/build.log | tail -n 6 | while IFS= read -r line; do
            echo "::error::${line}"
          done || true

      - uses: actions/upload-artifact@v4
        with:
          name: sentinelx-apk-${{ github.sha }}
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      # OTA: on a successful main build, publish a GitHub Release with the APK
      # (fixed name) and update.json. Devices poll releases/latest/download/
      # update.json, detect the higher version_code, and prompt to install.
      # Gated to main so feature-branch builds never push updates to devices.
      - name: Publish OTA release (main only)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          APK=$(ls bin/*.apk | head -1)
          cp "$APK" sentinelx.apk
          VC="${{ github.run_number }}"
          VER=$(grep -E '^version' buildozer.spec | head -1 | cut -d'=' -f2 | tr -d ' ')
          printf '{"version":"%s","version_code":%s,"url":"https://github.com/%s/releases/latest/download/sentinelx.apk","notes":"Automated build %s"}\n' \
            "$VER" "$VC" "${{ github.repository }}" "$VC" > update.json
          cat update.json
          TAG="v${VER}-${VC}"
          gh release create "$TAG" sentinelx.apk update.json \
            --title "Sentinel-X ${VER} (build ${VC})" \
            --notes "Automated OTA release. Installed apps auto-detect this and prompt to install." \
            --latest
